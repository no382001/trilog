name: Test Report
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: publish test results
        uses: dorny/test-reporter@v1
        with:
          artifact: test-results
          name: Quad Tests
          path: '*.xml'
          reporter: java-junit
          fail-on-error: false
