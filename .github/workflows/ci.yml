name: CI
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang-format

      - name: build
        run: make

      - name: upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abclog-build
          path: |
            abclog
            _build

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: abclog-build

      - name: run quad tests
        run: |
          chmod +x ./abclog
          make quad-junit

      - name: publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Quad Tests
          path: _build/test-results/*.xml
          reporter: java-junit
          fail-on-error: false

  freestanding:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: build freestanding
        run: |
          mkdir -p _build
          make freestanding
