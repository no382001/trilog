name: CI
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang-format

      - name: build
        run: make

      - name: upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trilog-build
          path: |
            trilog
            _build

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: trilog-build

      - name: run quad tests
        run: |
          chmod +x ./trilog
          make quad-junit

      - name: publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Quad Tests
          path: _build/test-results/*.xml
          reporter: java-junit
          fail-on-error: false

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install emsdk
        uses: mymindstorm/setup-emsdk@v14

      - name: build wasm
        run: make web

      - name: deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
