<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>trilog</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal { flex: 1; padding: 8px; min-height: 0; overflow: hidden; }
    #statusbar { display: none; }
    #stats-panel {
      background: #111;
      border-top: 1px solid #333;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      font: 12px "Cascadia Code", "Fira Code", monospace;
      color: #888;
      flex-shrink: 0;
    }
    #stats-panel .stat { white-space: nowrap; }
    #stats-panel .stat b { color: #d4d4d4; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
    #stats-canvas {
      flex: 1;
      height: 48px;
      min-width: 100px;
    }
    #usage-panel {
      background: #111;
      border-top: 1px solid #222;
      padding: 6px 10px;
      display: flex;
      gap: 12px;
      font: 11px "Cascadia Code", "Fira Code", monospace;
      color: #666;
      flex-shrink: 0;
    }
    .usage-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .usage-item .label { color: #888; min-width: 50px; }
    .usage-bar {
      width: 60px;
      height: 8px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    .usage-bar-fill {
      height: 100%;
      background: #4ec994;
      border-radius: 2px;
      transition: width 0.15s, background 0.3s;
    }
    .usage-bar-fill.warn { background: #d7ba7d; }
    .usage-bar-fill.crit { background: #f44747; }
    .usage-val { color: #555; }
    #m0-badge {
      color: #555;
      font-size: 10px;
      margin-left: auto;
      white-space: nowrap;
    }
    #m0-badge b { color: #888; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="stats-panel">
    <span class="stat"><span class="dot" style="background:#4ec994"></span>son <b id="st-son">0</b></span>
    <span class="stat"><span class="dot" style="background:#569cd6"></span>unify <b id="st-unify">0</b></span>
    <span class="stat">fail <b id="st-fail">0</b></span>
    <span class="stat"><span class="dot" style="background:#f44747"></span>bt <b id="st-bt">0</b></span>
    <span class="stat">terms <b id="st-terms">0</b></span>
    <canvas id="stats-canvas"></canvas>
  </div>
  <div id="usage-panel">
    <div class="usage-item"><span class="label">heap</span><div class="usage-bar"><div class="usage-bar-fill" id="ub-term"></div></div><span class="usage-val" id="uv-term"></span></div>
    <div class="usage-item"><span class="label">strings</span><div class="usage-bar"><div class="usage-bar-fill" id="ub-str"></div></div><span class="usage-val" id="uv-str"></span></div>
    <div class="usage-item"><span class="label">clauses</span><div class="usage-bar"><div class="usage-bar-fill" id="ub-cls"></div></div><span class="usage-val" id="uv-cls"></span></div>
    <div class="usage-item"><span class="label">binds</span><div class="usage-bar"><div class="usage-bar-fill" id="ub-bind"></div></div><span class="usage-val" id="uv-bind"></span></div>
    <div class="usage-item"><span class="label">stack</span><div class="usage-bar"><div class="usage-bar-fill" id="ub-stk"></div></div><span class="usage-val" id="uv-stk"></span></div>
    <span id="m0-badge"><b>M0+</b> 32KB SRAM</span>
  </div>
  <div id="statusbar">reading input &mdash; type <span>end_of_file.</span> on its own line to finish, or <span>?</span> for help (output shown when done)</div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="trilog.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true,
      fontFamily: '"Cascadia Code", "Fira Code", "Consolas", monospace',
      fontSize: 14,
      lineHeight: 1.3,
      theme: {
        background: '#1a1a1a', foreground: '#d4d4d4', cursor: '#d4d4d4',
        selectionBackground: '#444',
        black: '#1a1a1a', brightBlack: '#555',
        red: '#f44747',   brightRed: '#f44747',
        green: '#4ec994', brightGreen: '#4ec994',
        yellow: '#d7ba7d',brightYellow: '#d7ba7d',
        blue: '#569cd6',  brightBlue: '#569cd6',
        magenta: '#c586c0',brightMagenta: '#c586c0',
        cyan: '#4ec9b0',  brightCyan: '#4ec9b0',
        white: '#d4d4d4', brightWhite: '#e8e8e8',
      },
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    window.addEventListener('resize', () => fitAddon.fit());

    let inputLine  = '';
    let history    = [];
    let histIdx    = -1;
    let evalBusy   = false;

    function prompt() { term.write('\x1b[90m?-\x1b[0m '); }
    function termWrite(text) { term.write(text.replace(/\n/g, '\r\n')); }

    Module.onRuntimeInitialized = function () {
      const init       = Module.cwrap('trilog_web_init',       null,     []);
      const eval_      = Module.cwrap('trilog_web_eval',       'string', ['string'], {async: true});
      const pushLine   = Module.cwrap('trilog_web_push_line',  null,     ['string']);
      const isReading  = Module.cwrap('trilog_web_is_reading', 'number', []);
      const takeOutput = Module._trilog_web_take_output
        ? Module.cwrap('trilog_web_take_output', 'string', [])
        : null;

      const statusbar = document.getElementById('statusbar');
      setInterval(() => {
        if (isReading()) {
          statusbar.classList.add('visible');
          if (takeOutput) {
            const out = takeOutput();
            if (out) termWrite(out);
          }
        } else {
          statusbar.classList.remove('visible');
        }
        if (evalBusy) updateStats();
      }, 100);

      init();

      // --- stats graph setup ---
      const setYield = Module.cwrap('trilog_web_set_yield', null, ['number']);
      const getStats = Module.cwrap('trilog_web_get_stats', 'number', []);
      const getUsage = Module.cwrap('trilog_web_get_usage', 'number', []);
      setYield(1);

      const canvas = document.getElementById('stats-canvas');
      const gctx   = canvas.getContext('2d');
      const MAX_PTS = 200;
      const series  = {
        son:   { pts: [], color: '#4ec994' },
        unify: { pts: [], color: '#569cd6' },
        bt:    { pts: [], color: '#f44747' },
      };
      let prevStats = [0, 0, 0, 0, 0, 0, 0];

      function readStats() {
        const ptr = getStats();
        if (!ptr) return null;
        return [
          Module.getValue(ptr,      'i32'),
          Module.getValue(ptr +  4, 'i32'),
          Module.getValue(ptr +  8, 'i32'),
          Module.getValue(ptr + 12, 'i32'),
          Module.getValue(ptr + 16, 'i32'),
          Module.getValue(ptr + 20, 'i32'),
          Module.getValue(ptr + 24, 'i32'),
        ];
      }

      function readUsage() {
        const ptr = getUsage();
        if (!ptr) return null;
        const u = [];
        for (let i = 0; i < 10; i++)
          u.push(Module.getValue(ptr + i * 4, 'i32'));
        return u;
      }

      function fmtBytes(n) {
        if (n >= 1024) return (n / 1024).toFixed(1) + 'K';
        return n + 'B';
      }

      function updateUsageBar(barId, valId, used, total, isBytes) {
        const pct = total > 0 ? (used / total) * 100 : 0;
        const bar = document.getElementById(barId);
        bar.style.width = Math.min(pct, 100) + '%';
        bar.className = 'usage-bar-fill' +
          (pct > 90 ? ' crit' : pct > 70 ? ' warn' : '');
        document.getElementById(valId).textContent =
          isBytes ? fmtBytes(used) + '/' + fmtBytes(total) : used + '/' + total;
      }

      function updateUsage() {
        const u = readUsage();
        if (!u) return;
        updateUsageBar('ub-term', 'uv-term', u[0], u[1], true);
        updateUsageBar('ub-str',  'uv-str',  u[2], u[3], true);
        updateUsageBar('ub-cls',  'uv-cls',  u[4], u[5], false);
        updateUsageBar('ub-bind', 'uv-bind', u[6], u[7], false);
        updateUsageBar('ub-stk',  'uv-stk',  u[8], u[9], false);
      }

      function drawGraph() {
        const dpr = window.devicePixelRatio || 1;
        const w = canvas.clientWidth, h = canvas.clientHeight;
        canvas.width = w * dpr; canvas.height = h * dpr;
        gctx.scale(dpr, dpr);
        gctx.clearRect(0, 0, w, h);

        let maxVal = 1;
        for (const s of Object.values(series))
          for (const v of s.pts) if (v > maxVal) maxVal = v;

        for (const s of Object.values(series)) {
          if (!s.pts.length) continue;
          const n = s.pts.length;
          const step = n > 1 ? w / (n - 1) : 0;
          gctx.beginPath();
          gctx.strokeStyle = s.color;
          gctx.fillStyle = s.color;
          gctx.lineWidth = 1.5;
          for (let i = 0; i < n; i++) {
            const x = i * step;
            const y = h - (s.pts[i] / maxVal) * (h - 4) - 2;
            if (i === 0) gctx.moveTo(x, y); else gctx.lineTo(x, y);
            if (n < 20) gctx.fillRect(x - 2, y - 2, 4, 4);
          }
          gctx.stroke();
        }
      }

      function updateStats() {
        const s = readStats();
        if (!s) return;
        const dSon   = s[0] - prevStats[0];
        const dUnify = s[1] - prevStats[1];
        const dBt    = s[3] - prevStats[3];
        if (!dSon && !dUnify && !dBt) {
          updateUsage();
          return;
        }
        prevStats = [...s];

        series.son.pts.push(dSon);
        series.unify.pts.push(dUnify);
        series.bt.pts.push(dBt);
        for (const sr of Object.values(series))
          if (sr.pts.length > MAX_PTS) sr.pts.shift();

        document.getElementById('st-son').textContent   = s[0];
        document.getElementById('st-unify').textContent  = s[1];
        document.getElementById('st-fail').textContent   = s[2];
        document.getElementById('st-bt').textContent     = s[3];
        document.getElementById('st-terms').textContent  = s[4];
        drawGraph();
        updateUsage();
      }

      prompt();

      term.onData(e => {
        for (let i = 0; i < e.length; i++) {
          const ch   = e[i];
          const code = ch.charCodeAt(0);

          if (code === 13) { // Enter
            term.write('\r\n');
            const line = inputLine;
            inputLine  = '';

            if (isReading()) {
              // trilog is blocked in read_line_to_atom — feed the line in
              if (takeOutput) { const out = takeOutput(); if (out) termWrite(out); }
              pushLine(line);
            } else if (!evalBusy) {
              const trimmed = line.trim();
              if (trimmed) {
                history.unshift(trimmed);
                histIdx  = -1;
                evalBusy = true;
                eval_(trimmed).then(result => {
                  termWrite(result);
                  updateStats();
                  updateUsage();
                  prompt();
                  evalBusy = false;
                });
              } else {
                prompt();
              }
            }

          } else if (code === 127 || code === 8) { // Backspace
            if (inputLine.length > 0) {
              inputLine = inputLine.slice(0, -1);
              term.write('\b \b');
            }

          } else if (ch === '\x1b' && e[i+1] === '[') { // arrow keys
            const arrow = e[i+2];
            i += 2;
            if (!isReading() && arrow === 'A' && history.length > 0) {
              if (histIdx < history.length - 1) histIdx++;
              const entry = history[histIdx];
              term.write('\r\x1b[K'); prompt(); term.write(entry);
              inputLine = entry;
            } else if (!isReading() && arrow === 'B') {
              if (histIdx > 0) {
                histIdx--;
                const entry = history[histIdx];
                term.write('\r\x1b[K'); prompt(); term.write(entry);
                inputLine = entry;
              } else if (histIdx === 0) {
                histIdx = -1;
                term.write('\r\x1b[K'); prompt();
                inputLine = '';
              }
            }

          } else if (code >= 32) {
            inputLine += ch;
            term.write(ch);
          }
        }
      });
    };
  </script>
</body>
</html>
